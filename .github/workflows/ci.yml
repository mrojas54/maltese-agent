name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v7

      - name: Debt gates
        run: ./scripts/debt-gates.sh

      - name: Read pinned toolchain from rust-toolchain.toml
        id: toolchain
        run: echo "channel=$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      # TD-9 / AC-17 (WS-7): supply-chain gate. Prebuilt binary via
      # taiki-e/install-action (~1s), same rationale as the ast-grep install
      # below — `cargo install cargo-audit` would add ~3min of compile.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Audits Cargo.lock against the RustSec database; runs pre-compile so
      # advisory failures surface fast. Accepted advisories, if ever any,
      # are allowlisted in .cargo/audit.toml — each with a comment (AC-17).
      # G-1: if an advisory lands in falcon-agent's deps, the allowlist is
      # the ONLY permitted response; planted material is never altered.
      - name: cargo audit
        run: cargo audit

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (falcon-mcp only — falcon-agent contains intentional planted lints)
        run: cargo clippy -p falcon-mcp --all-targets -- -D warnings

      # ast-grep is required by fs_search_ast tests. Use the prebuilt binary
      # from taiki-e/install-action (~1s) rather than `cargo install` (~3min).
      - name: Install ast-grep
        uses: taiki-e/install-action@v2
        with:
          tool: ast-grep

      - name: cargo test
        run: cargo test --workspace --all-targets

      # G-1: falcon-agent's planted defects (poisoned prompt example, missing
      # guards, three documented clippy lints, #[ignore]'d smoking-gun test)
      # are the workshop PRODUCT. This guard (H-8, wired by MA-3 per SPEC R-2)
      # asserts each defect is present and correctly marked; "fixing" one
      # fails CI. It runs LAST in this job because it does
      # `cargo clean -p falcon-agent` between its clippy invocations — placing
      # it earlier would force needless recompilation in the steps above.
      - name: Planted-defect guard (G-1)
        run: ./scripts/check-planted-defects.sh

  typescript:
    name: TypeScript (falcon-detective build + test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v7

      # falcon-detective tests (prepWorktree, FalconMcpClient) spawn the
      # falcon-mcp binary at target/debug/falcon-mcp, so build it first.
      - name: Read pinned toolchain from rust-toolchain.toml
        id: toolchain
        run: echo "channel=$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build falcon-mcp binary
        run: cargo build -p falcon-mcp

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: falcon-detective/package-lock.json

      - name: npm ci
        working-directory: falcon-detective
        run: npm ci

      # TD-9 / AC-17 (WS-7): supply-chain gate; fails on high/critical
      # advisories in package-lock.json. Policy: fix-in-range first
      # (`npm audit fix`); npm audit has no native ignore file, so if an
      # advisory ever has NO fix and must be accepted, allowlist it in-repo
      # with a commented exceptions list (e.g. better-npm-audit + .nsprc,
      # each entry carrying reason + revisit date) and swap this step to run
      # through it. No accepted advisories exist today.
      - name: npm audit (high+)
        working-directory: falcon-detective
        run: npm audit --audit-level=high

      - name: biome lint (TD-8 / AC-16)
        working-directory: falcon-detective
        run: npm run lint

      - name: tsc build
        working-directory: falcon-detective
        run: npm run build

      # Full suite including the e2e (AC-5). E2E_REQUIRED=1 turns unmet e2e
      # prerequisites (missing binary/cassettes, dirty falcon-agent/) into
      # FAILURES instead of skips, so a green run mechanically implies the
      # e2e executed. `test:full` deliberately does NOT inherit the fast
      # suite's FALCON_MCP_BIN=/nonexistent/hermetic pin — the real binary is
      # built by the "Build falcon-mcp binary" step above. Cost note: the
      # e2e's smoking-gun step compiles falcon-agent inside its fresh
      # .runs/e2e-test worktree (cold target dir; the cargo registry cache
      # still applies), adding a few minutes to this job.
      # E2E_REQUIRED is PARKED until the M4 cassette re-record (operator
      # decision 2026-07-10, ticket MA-2 review): the checked-in cassettes
      # are stale vs the current triage prompt, so a hard gate today would
      # red every PR. The e2e still RUNS here and reports a visible skip
      # with reason. MA-22 (final sweep) flips E2E_REQUIRED to "1"
      # immediately after the MA-24 re-record lands.
      - name: vitest (full suite, e2e skip-if-unmet)
        working-directory: falcon-detective
        run: npm run test:full
        env:
          E2E_REQUIRED: "0"
          # On a cassette miss, dump the normalized prompt (gemini.ts) so the
          # step below can print it — the only way to diff a CI-side key
          # divergence against a locally recorded cassette.
          GEMINI_DEBUG_PROMPTS: "1"

      - name: cassette-miss diagnostics (prints normalized prompts on key divergence)
        if: always()
        working-directory: falcon-detective
        run: |
          if ls fixtures/cassettes/_miss_*.normalized.txt >/dev/null 2>&1; then
            for f in fixtures/cassettes/_miss_*.normalized.txt; do
              echo "::group::$f"
              cat "$f"
              echo "::endgroup::"
            done
          else
            echo "no cassette misses"
          fi
