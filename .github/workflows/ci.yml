name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Debt gates
        run: ./scripts/debt-gates.sh

      - name: Read pinned toolchain from rust-toolchain.toml
        id: toolchain
        run: echo "channel=$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (falcon-mcp only — falcon-agent contains intentional planted lints)
        run: cargo clippy -p falcon-mcp --all-targets -- -D warnings

      # ast-grep is required by fs_search_ast tests. Use the prebuilt binary
      # from taiki-e/install-action (~1s) rather than `cargo install` (~3min).
      - name: Install ast-grep
        uses: taiki-e/install-action@v2
        with:
          tool: ast-grep

      - name: cargo test
        run: cargo test --workspace --all-targets

  typescript:
    name: TypeScript (falcon-detective build + test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      # falcon-detective tests (prepWorktree, FalconMcpClient) spawn the
      # falcon-mcp binary at target/debug/falcon-mcp, so build it first.
      - name: Read pinned toolchain from rust-toolchain.toml
        id: toolchain
        run: echo "channel=$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build falcon-mcp binary
        run: cargo build -p falcon-mcp

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: falcon-detective/package-lock.json

      - name: npm ci
        working-directory: falcon-detective
        run: npm ci

      - name: tsc build
        working-directory: falcon-detective
        run: npm run build

      - name: vitest
        working-directory: falcon-detective
        run: npm test
