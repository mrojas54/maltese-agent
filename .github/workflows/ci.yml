name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (falcon-mcp only — falcon-agent contains intentional planted lints)
        run: cargo clippy -p falcon-mcp --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

  typescript:
    name: TypeScript (falcon-detective build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: falcon-detective
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: falcon-detective/package-lock.json

      - name: npm ci
        run: npm ci

      - name: tsc build
        run: npm run build

      - name: vitest
        run: npm test
